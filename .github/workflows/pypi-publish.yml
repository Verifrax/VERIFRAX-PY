name: pypi-publish

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  pypi-publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[test,build]"

      - run: pytest -q

      - run: python scripts/check-version-immutability-index-refusal-boundary.py
      - run: python scripts/check-external-trusted-publisher-claim-lock-boundary.py
      - run: python scripts/check-release-artifact-digest-replay-boundary.py
      - run: python scripts/check-v010-release-admissibility-closure-boundary.py
      - run: python scripts/check-no-publish-final-readiness-ledger.py
      - run: python scripts/check-production-pypi-publish-deadman-boundary.py
      - run: python scripts/check-pypi-trusted-publisher-readiness-seal.py
      - run: python scripts/check-publish-workflow-order-lock-boundary.py

      - run: python scripts/create-production-pypi-publish-runtime-authorization.py
      - run: python scripts/check-production-pypi-publish-authorization-boundary.py

      - run: python -m build

      - run: python scripts/check-v010-release-admissibility-closure-boundary.py
      - run: python scripts/check-production-pypi-publish-authorization-boundary.py

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://upload.pypi.org/legacy/
          attestations: true
          print-hash: true
          verbose: true
