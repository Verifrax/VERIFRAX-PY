name: publish-workflow-order-lock-boundary

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-workflow-order-lock-boundary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[test,build]"
      - run: pytest -q
      - run: python scripts/check-publish-workflow-order-lock-boundary.py
      - run: python scripts/check-no-publish-final-readiness-ledger.py
