name: release-candidate-attestation-readiness-boundary

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-candidate-attestation-readiness-boundary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[test,build]"
      - run: pytest
      - run: python scripts/check-release-candidate-attestation-readiness-boundary.py
