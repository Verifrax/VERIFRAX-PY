name: cold-clone-no-publish-replay-boundary

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cold-clone-no-publish-replay-boundary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/check-cold-clone-no-publish-replay-boundary.py
