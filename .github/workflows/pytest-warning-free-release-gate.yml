name: pytest-warning-free-release-gate

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pytest-warning-free-release-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[test,build]"
      - run: python scripts/check-pytest-warning-free-release-gate.py
