name: production-pypi-publish-deadman-boundary

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  production-pypi-publish-deadman-boundary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[test,build]"
      - run: pytest -q
      - run: python scripts/check-production-pypi-publish-deadman-boundary.py
      - run: python scripts/check-pypi-trusted-publisher-readiness-seal.py
