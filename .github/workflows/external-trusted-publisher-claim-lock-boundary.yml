name: external-trusted-publisher-claim-lock-boundary

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  external-trusted-publisher-claim-lock-boundary:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package with test/build extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test,build]"

      - name: Check external trusted publisher claim lock boundary
        run: python scripts/check-external-trusted-publisher-claim-lock-boundary.py
