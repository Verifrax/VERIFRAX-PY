name: distribution-installation-replay-proof

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  distribution-installation-replay-proof:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[test,build]"
      - run: pytest
      - run: python scripts/check-distribution-installation-replay-proof.py
